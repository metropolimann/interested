<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intersted — Login</title>
    <link rel="stylesheet" href="../Css/main.css">
</head>
<body class="auth-page">
<div id="toast"></div>

<a href="../index.html" class="auth-logo">
    <img src="../Images/logo3.0.png" alt="Intersted logo">
    <span>Intersted</span>
</a>

<div class="container">
    <h2>Welcome back 👋</h2>
    <p class="subtitle">Sign in to your account</p>

    <form action="../index.html">
        <div class="field-group">
            <label>Email</label>
            <input type="email" placeholder="YourEmail@email.com" required>
        </div>
        <div class="field-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" required>
        </div>
        <div class="forgot-link">
            <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="auth-btn">Sign In</button>
    </form>

    <div class="switch-link">
        Don't have an account? <a href="register.html">Create one</a>
    </div>
</div>

<footer>
    All copyrights belong to <strong>Intersted Group</strong> &nbsp;·&nbsp; Powered by <strong>human's flexibility</strong>
</footer>

<script src="../Scripts/main.js"></script>
</body>
</html>
