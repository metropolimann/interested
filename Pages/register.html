<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intersted — Register</title>
    <link rel="stylesheet" href="../Css/main.css">
</head>
<body class="auth-page">
<div id="toast"></div>

<a href="../index.html" class="auth-logo">
    <img src="../Images/logo3.0.png" alt="Intersted logo">
    <span>Intersted</span>
</a>

<div class="container">
    <h2>Create an account</h2>
    <p class="subtitle">Join the Intersted community</p>

    <form action="../index.html">
        <div class="name-row">
            <div class="field-group">
                <label>First Name</label>
                <input type="text" placeholder="Ahmed" required>
            </div>
            <div class="field-group">
                <label>Last Name</label>
                <input type="text" placeholder="Mrani" required>
            </div>
        </div>
        <div class="field-group">
            <label>Username</label>
            <input type="text" placeholder="@ahmed.mrani" required>
        </div>
        <div class="field-group">
            <label>Email</label>
            <input type="email" placeholder="YourEmail@email.com" required>
        </div>
        <div class="field-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" required>
        </div>
        <div class="field-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="auth-btn">Create Account</button>
    </form>

    <div class="switch-link">
        Already have an account? <a href="log.html">Sign in</a>
    </div>
</div>

<footer>
    All copyrights belong to <strong>Intersted Group</strong> &nbsp;·&nbsp; Powered by <strong>human's flexibility</strong>
</footer>

<script src="../Scripts/main.js"></script>
</body>
</html>
